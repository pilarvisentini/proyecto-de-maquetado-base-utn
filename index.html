<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto de Maquetado Web</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
    <section class="header-container">
        <header class="header-logo">
            <img src="assets/images/logo.png" alt="logo">
        </header>
        
        <header class="header-title">
            <h1>Character Counter</h1>
        </header>
        
        <header class="header-button">
            <button>
                <img src="assets/images/color-mode-icon.png" alt="light/dark mode">
            </button>
        </header>
    </section>

    <article class="hero">
        <section class="title">
            <div>
                <h1>Analize your text in real time</h1>
            </div>
        </section>

        <section class="text-box">
            <div>
                <textarea id="text-input" name="text-input" rows="4" cols="50">Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.
                </textarea>
            </div>
        </section>
        
        <section class="controls">
            <div>
                <input type="checkbox1" id="option1">
                <label for="checkbox1"> Exclude Spaces</label><br>
                <input type="checkbox2" id="option2">
                <label for="checkbox2"> Set Character Limit</label><br>
            </div>

            <div>
                <p> Approx. reading time: &lt;1 minute</p>
            </div>
        </section>
    </article>

    <article class="metric-cards">
        <section class="card-containers">
            <div class="card1">
                <div class="card-content">
                    <h1>278</h1>
                    <p>Total Characters</p>
                    <img src="assets/images/card1.png" alt="total characters">
                </div>
            </div>
            
            <div class="card2">
                <div class="card-content">
                <h1>39</h1>
                <p>Word Count</p>
                <img src="assets/images/card2.png" alt="word count">
            </div>
        </div>
        
            <div class="card3">
                <div class="card-content">
                <h1>04</h1>
                <p>Sentence Count</p>
                <img src="assets/images/card3.png" alt="sentence count">
            </div>
        </div>
        </section>
    </article>
    
    <article class="progress-bars">
        <section class="bars-container">
            <div class="bars-title">
                <h1>Letter Density</h1> 
            </div>

            <div class="bar1">
                <label for="bar1">E</label>
                <progress id="bar1" max="100" value="16.06">16.06%</progress>
                <label for="bar1">40 (16.06%)</label>
            </div>

            <div class="bar2">
                <label for="bar2">I</label>
                <progress id="bar2" max="100" value="11.65">11.65%</progress>
                <label for="bar2">29 (11.65%)</label>
            </div>

            <div class="bar3">
                <label for="bar3">T</label>
                <progress id="bar3" max="100" value="11.24">11.24%</progress>
                <label for="bar3">28 (11.24%)</label>
            </div>

            <div class="bar4">
                <label for="bar4">O</label>
                <progress id="bar4" max="100" value="8.84">8.84%</progress>
                <label for="bar4">22 (8.84%)</label>
            </div>

            <div class="bar5">
                <label for="bar5">N</label>
                <progress id="bar5" max="100" value="8.43">8.43%</progress>
                <label for="bar5">21 (8.43%)</label>
            </div>

            <div class="footer">
                <h1>See more</h1>
                <button>˅</button>
            </div>
        </section>
    </article>
    </div>
</body>

</html>
