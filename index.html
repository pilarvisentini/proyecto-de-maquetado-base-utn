<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto de Maquetado Web</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <article class="header">
        <section class="container">
            <div>
                <img src="assets/images/logo.png" alt="logo">
                <h1>Character Counter</h1>
            </div>
            <div>
                <button class="color-mode-toggle">
                    <img src="assets/images/color-mode-icon.png" alt="light/dark mode">
                </button>
            </div>
        </section>
    </article>

    <article class="hero">
        <section class="title">
            <div>
                <h1>Analize your text in real time</h1>
            </div>
        </section>

        <section>
            <textarea name="text box" id="">

            </textarea>
            <div>
                <input type="checkbox" id="option1">
                <label for="vehicle1"> Exclude Spaces</label><br>
                <input type="checkbox" id="option2">
                <label for="vehicle1"> Set Character Limit</label><br>
            </div>

            <div>
                <p> Approx. reading time: &lt1 minute</p>
            </div>
        </section>
    </article>
</body>

</html>
